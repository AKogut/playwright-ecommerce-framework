name: Smoke Run

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || github.event.review.state == 'approved' || github.event.review.state == 'changes_requested' || github.event.review.state == 'commented' }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://www.saucedemo.com/
      STANDARD_USER_USERNAME: standard_user
      STANDARD_USER_PASSWORD: secret_sauce
      LOCKED_USER_USERNAME: locked_out_user
      LOCKED_USER_PASSWORD: secret_sauce
      PROBLEM_USER_USERNAME: problem_user
      PROBLEM_USER_PASSWORD: secret_sauce
      PERFORMANCE_USER_USERNAME: performance_glitch_user
      PERFORMANCE_USER_PASSWORD: secret_sauce
      SKIP_BASE_URL_HEALTHCHECK: false
      BASE_URL_HEALTHCHECK_RETRIES: 3
      BASE_URL_HEALTHCHECK_BACKOFF_MS: 2000
      GLOBAL_TIMEOUT_MS: 600000
      TEST_TIMEOUT_MS: 30000
      EXPECT_TIMEOUT_MS: 5000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run smoke tests
        run: npm run test:smoke
