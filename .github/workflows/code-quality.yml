name: Code Quality Checks
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint-and-format:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript type check
        run: npm run typecheck
      - name: Run ESLint
        run: npm run lint
      - name: Run Prettier check
        run: npm run format
