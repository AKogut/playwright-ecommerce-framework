name: Regression Run

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    permissions:
      contents: read
      actions: write
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    runs-on: ubuntu-latest
    # Official Playwright image ships browsers + OS dependencies preinstalled, so no
    # `playwright install` step is needed (avoids the extract-zip hang on Node 24 in
    # Playwright < 1.60). Keep the tag in sync with @playwright/test in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      # Firefox needs to create a user namespace for its sandbox; the default
      # seccomp profile on the job container blocks the clone() syscall (EPERM).
      options: --security-opt seccomp=unconfined
    env:
      # The container runs as root, but Actions forces HOME=/github/home (owned by
      # the image's pwuser); Firefox refuses to start as root under another user's
      # HOME. Point HOME at a root-owned dir to resolve the mismatch.
      HOME: /root
      # Image installs browsers here; pin it so resolution is HOME-independent.
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      BASE_URL: https://www.saucedemo.com/
      STANDARD_USER_USERNAME: standard_user
      STANDARD_USER_PASSWORD: secret_sauce
      LOCKED_USER_USERNAME: locked_out_user
      LOCKED_USER_PASSWORD: secret_sauce
      PROBLEM_USER_USERNAME: problem_user
      PROBLEM_USER_PASSWORD: secret_sauce
      PERFORMANCE_USER_USERNAME: performance_glitch_user
      PERFORMANCE_USER_PASSWORD: secret_sauce
      SKIP_BASE_URL_HEALTHCHECK: false
      BASE_URL_HEALTHCHECK_RETRIES: 3
      BASE_URL_HEALTHCHECK_BACKOFF_MS: 2000
      GLOBAL_TIMEOUT_MS: 600000
      TEST_TIMEOUT_MS: 30000
      EXPECT_TIMEOUT_MS: 5000
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full regression tests (${{ matrix.browser }})
        run: npm run test:regression:${{ matrix.browser }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ github.job }}-${{ matrix.browser }}
          path: allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.job }}-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload test-results (failure media only)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ github.job }}-${{ matrix.browser }}
          path: test-results/
          retention-days: 30
          if-no-files-found: warn

  allure-report:
    name: Allure HTML report
    needs: [regression]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      has_report: ${{ steps.merge.outputs.has_report }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Allure raw results
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: allure-results-regression-*
          path: downloaded
          merge-multiple: false

      - name: Merge results and generate Allure HTML
        id: merge
        run: |
          set -euo pipefail
          mkdir -p allure-results
          if [ -d downloaded ]; then
            find downloaded -type f -exec cp -f {} allure-results/ \;
          fi
          count="$(find allure-results -type f 2>/dev/null | wc -l | tr -d ' ')"
          if [ "${count:-0}" -eq 0 ]; then
            echo "has_report=false" >> "$GITHUB_OUTPUT"
            echo "No Allure result files; skipping report generation."
            exit 0
          fi
          npx allure generate ./allure-results --output ./allure-report
          echo "has_report=true" >> "$GITHUB_OUTPUT"

      - name: Upload Allure HTML report bundle
        if: steps.merge.outputs.has_report == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-bundle
          path: allure-report/
          retention-days: 30
